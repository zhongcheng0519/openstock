services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-openstock}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-openstock}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${IMAGE_PREFIX:-openstock}-backend:${BACKEND_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-openstock}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN}
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
      DEBUG: "false"

  frontend:
    image: ${IMAGE_PREFIX:-openstock}-frontend:${FRONTEND_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  postgres_data:
